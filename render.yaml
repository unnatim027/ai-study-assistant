services:
  - type: web
    name: study-assistant-api
    runtime: node
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: PORT
        value: 3001
